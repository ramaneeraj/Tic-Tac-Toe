<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>

        <div class="mode-selection">
            <button id="friendMode">Friend Mode</button>
            <button id="computerMode">Computer Mode</button>
        </div>

        <h2 id="status">Select a mode to start</h2>

        <div class="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="restartBtn">Restart Game</button>

        <p class="footer">Developed by <a href="https://github.com/ramaneeraj" target="_blank" rel="noopener noreferrer">Rama Neeraj</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
